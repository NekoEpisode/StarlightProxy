# Starlight代理设置
proxy:
  host: "0.0.0.0" # 代理服务器监听地址
  port: 25565 # 代理服务器启动端口
  max-players: 100 # 仅作展示，Starlight不会真正拦截玩家
  online-mode: true # 是否启用在线模式（正版验证），开启时强制启用加密
  encryption: true # 是否启用加密（即使是离线模式）；online-mode 为 true 时此项无效，加密始终开启
  forward-type: "none" # IP转发的格式, 支持modern(Velocity现代转发), none(不使用转发)
  forward-secret: "" # IP转发的密钥，仅当forward-type为"modern"时有效
  motd: "<gradient:#FFE100:#383500>Starlight Proxy - Full rewrote!</gradient>" # MOTD，支持MiniMessage语法
  force-default-server: false # 是否强制将玩家发送到默认服务器（无论其是否加入过代理）
  default-server: lobby # 如果玩家第一次加入代理，则将其发送到的服务器
  bungeecord-plugin-message: false # 是否启用BungeeCord插件消息通道兼容
  language: "zh_cn" # 默认语言 (可选: zh_cn, en_us, 或其他插件注册的新语言)
  logging-command: false # 是否记录玩家的命令操作; 注意: 这可能导致信息泄露或性能问题，谨慎开启
  compress-threshold: 256 # 启用数据包压缩的阈值
  icon-file-path: "./icon.png" # 服务器图标的文件路径
  allow-transfer: false # 是否允许Transfer连接

servers:
  # 地址格式支持以下三种：
  #   hostname          — 先查询 _minecraft._tcp.hostname SRV 记录，若无则使用端口 25565
  #   hostname:port     — 直接使用给定主机名和端口（不查询 SRV）
  #   1.2.3.4:port      — 直接使用给定 IP 和端口
  lobby:
    address: "127.0.0.1:25566"
  example2:
    address: "127.0.0.2:25567"